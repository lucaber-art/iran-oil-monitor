name: Iran Oil Monitor

on:
  schedule:
    # Esegue ogni 2 ore (ai minuti 0) -> 12 volte al giorno (sicuro per il limite free)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Permette avvio manuale per test

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --timeout 60 --retries 3 requests

      - name: Run news monitor
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_monitor.py
